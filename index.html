<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON TETRIS - Cyberpunk Arcade</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <div class="app-container">
        <!-- Header / Navigation -->
        <header class="game-header">
            <h1 class="logo">NEON<span class="highlight">TETRIS</span></h1>
            <div class="header-controls">
                <a href="checklist.html" class="icon-btn" title="Daily Checklist &amp; Todo">✅</a>
                <button id="theme-btn" class="icon-btn" title="Toggle Theme">🎨</button>
                <button id="sound-btn" class="icon-btn" title="Toggle Sound">🔊</button>
                <button id="pause-btn" class="icon-btn" title="Pause Game">⏸️</button>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-layout">
            <!-- Left Sidebar: Hold & Info -->
            <aside class="sidebar left-sidebar">
                <div class="panel glass-panel hold-panel">
                    <h3 class="panel-title">HOLD</h3>
                    <div class="mini-canvas-container">
                        <canvas id="hold-canvas" width="120" height="120"></canvas>
                    </div>
                </div>

                <div class="panel glass-panel stats-panel">
                    <div class="stat-box">
                        <span class="stat-label">HIGH SCORE</span>
                        <span id="high-score" class="stat-value highlight">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">SCORE</span>
                        <span id="score" class="stat-value">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">LEVEL</span>
                        <span id="level" class="stat-value">1</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">LINES</span>
                        <span id="lines" class="stat-value">0</span>
                    </div>
                </div>
            </aside>

            <!-- Center Matrix Canvas -->
            <div class="board-container glass-panel">
                <div id="game-overlay" class="overlay active">
                    <div class="overlay-content">
                        <h2 id="overlay-title" class="glow-text">READY PLAYER ONE</h2>
                        <p id="overlay-desc">Press START or Spacebar to begin</p>
                        <button id="start-btn" class="primary-btn">START GAME</button>
                    </div>
                </div>
                <canvas id="tetris-canvas" width="320" height="640"></canvas>
            </div>

            <!-- Right Sidebar: Next & Controls -->
            <aside class="sidebar right-sidebar">
                <div class="panel glass-panel next-panel">
                    <h3 class="panel-title">NEXT</h3>
                    <div class="mini-canvas-container">
                        <canvas id="next-canvas" width="120" height="300"></canvas>
                    </div>
                </div>

                <div class="panel glass-panel controls-guide">
                    <h3 class="panel-title">CONTROLS</h3>
                    <ul>
                        <li><kbd>←</kbd> <kbd>→</kbd> Move</li>
                        <li><kbd>↑</kbd> Rotate Clockwise</li>
                        <li><kbd>Z</kbd> Rotate Counter</li>
                        <li><kbd>↓</kbd> Soft Drop</li>
                        <li><kbd>Space</kbd> Hard Drop</li>
                        <li><kbd>C</kbd> / <kbd>Shift</kbd> Hold</li>
                        <li><kbd>P</kbd> Pause</li>
                    </ul>
                </div>
            </aside>
        </main>

        <!-- Touch Controls for Mobile / Mouse Casual Play -->
        <footer class="touch-controls">
            <div class="d-pad">
                <button id="touch-left" class="touch-btn">◀</button>
                <button id="touch-down" class="touch-btn">▼</button>
                <button id="touch-right" class="touch-btn">▶</button>
            </div>
            <div class="action-pad">
                <button id="touch-rotate" class="touch-btn action-rotate">↻</button>
                <button id="touch-drop" class="touch-btn action-drop">⤓</button>
                <button id="touch-hold" class="touch-btn action-hold">HOLD</button>
            </div>
        </footer>
    </div>

    <script src="audio.js"></script>
    <script src="tetris.js"></script>
</body>
</html>
